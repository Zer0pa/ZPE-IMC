name: imc-ci

on:
  pull_request:
    paths:
      - "code/**"
      - "executable/**"
      - "Makefile"
      - ".github/workflows/imc-ci.yml"
  push:
    branches: ["main", "master"]
    paths:
      - "code/**"
      - "executable/**"
      - "Makefile"
      - ".github/workflows/imc-ci.yml"

concurrency:
  group: imc-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: bootstrap
        run: make bootstrap
      - name: run tests
        run: make test
      - name: all-modality stream gate
        run: |
          cd code
          python -m pytest -q tests/test_all_modality_stream.py
      - name: lint key test surfaces
        run: |
          python -m pip install ruff
          python -m ruff check code/examples code/tests/test_examples_smoke.py code/tests/test_all_modality_stream.py

  test-voice-optional:
    name: test-voice-optional
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: bootstrap with optional voice deps
        run: make bootstrap OPTIONAL_EXTRAS=voice-optional
      - name: run tests with optional voice deps
        run: make test

  demo:
    name: demo
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: bootstrap
        run: make bootstrap
      - name: run demo
        run: make demo

  comet-local-fallback:
    name: comet-local-fallback
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: bootstrap
        run: make bootstrap
      - name: run comet local fallback
        env:
          COMET_API_KEY: ""
        run: make comet-run

  onboarding-smoke:
    name: onboarding-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "code/pyproject.toml"
      - name: editable-install smoke
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "./code[dev]"
      - name: CLI smoke
        run: |
          zpe-imc info --json
      - name: package build smoke
        working-directory: code
        run: |
          python -m build
